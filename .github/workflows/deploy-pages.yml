name: Deploy Next static export to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          pnpm approve-builds --all || true
      - name: Build static site
        env:
          BUILD_STATIC_EXPORT: '1'
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_ADMIN_EMAILS: ${{ vars.NEXT_PUBLIC_ADMIN_EMAILS }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_STRIPE_BASIC_NFC_PRICE_ID: ${{ vars.NEXT_PUBLIC_STRIPE_BASIC_NFC_PRICE_ID }}
          NEXT_PUBLIC_STRIPE_ID_NFC_PRICE_ID: ${{ vars.NEXT_PUBLIC_STRIPE_ID_NFC_PRICE_ID }}
        run: |
          set -euo pipefail
          trap 'if [ -d .app-api-vercel-only ]; then rm -rf app/api; mv .app-api-vercel-only app/api; fi' EXIT
          mv app/api .app-api-vercel-only
          pnpm build
          mv .app-api-vercel-only app/api
          trap - EXIT
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
